name: "Terraform CI/CD"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Choose action: apply or destroy"
        required: true
        type: choice
        options:
          - apply
          - destroy

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ter-homeworks/04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: true

      - name: Install Terraform manually (1.8.4)
        run: |
          wget -q https://releases.hashicorp.com/terraform/1.8.4/terraform_1.8.4_linux_amd64.zip
          unzip -o terraform_1.8.4_linux_amd64.zip
          sudo mv terraform /usr/local/bin/
          terraform version

      - name: Create terraformrc for Yandex mirror
        run: |
          cat > ~/.terraformrc << 'RC'
          provider_installation {
            network_mirror {
              url = "https://terraform-mirror.yandexcloud.net/"
              include = ["*/*"]
            }
            direct {
              exclude = ["*/*"]
            }
          }
          RC

      - name: Create YC SA key file
        run: echo '${{ secrets.YC_SERVICE_ACCOUNT_KEY_FILE }}' > /tmp/key.json

      - name: Create backend credentials file
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/credentials << 'CREDS'
          [default]
          aws_access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CREDS

      - name: DEBUG: show providers.tf
        run: |
          pwd
          ls -R
          echo "----- providers.tf -----"
          sed -n '1,80p' providers.tf || echo "NO providers.tf"

      - name: Terraform Init
        env:
          TF_VAR_yc_cloud_id: ${{ secrets.YC_CLOUD_ID }}
          TF_VAR_yc_folder_id: ${{ secrets.YC_FOLDER_ID }}
          TF_VAR_yc_sa_key_path: /tmp/key.json
        run: terraform init

      - name: Terraform Plan
        if: github.event.inputs.action == 'apply'
        env:
          TF_VAR_yc_cloud_id: ${{ secrets.YC_CLOUD_ID }}
          TF_VAR_yc_folder_id: ${{ secrets.YC_FOLDER_ID }}
          TF_VAR_yc_sa_key_path: /tmp/key.json
        run: terraform plan -no-color -out=tfplan

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        env:
          TF_VAR_yc_cloud_id: ${{ secrets.YC_CLOUD_ID }}
          TF_VAR_yc_folder_id: ${{ secrets.YC_FOLDER_ID }}
          TF_VAR_yc_sa_key_path: /tmp/key.json
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        env:
          TF_VAR_yc_cloud_id: ${{ secrets.YC_CLOUD_ID }}
          TF_VAR_yc_folder_id: ${{ secrets.YC_FOLDER_ID }}
          TF_VAR_yc_sa_key_path: /tmp/key.json
        run: terraform destroy -auto-approve
